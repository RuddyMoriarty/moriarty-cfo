name: Evals (skills validation)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  triggering-tests:
    name: Triggering tests (rapide, ~3min)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Validate frontmatter & file structure
        run: |
          python evals/run_evals.py --check-structure

      - name: Run triggering tests (subset rapide)
        run: |
          python evals/run_evals.py --triggering --quick
        continue-on-error: false

  functional-tests:
    name: Functional tests (sample par skill)
    runs-on: ubuntu-latest
    needs: triggering-tests
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run functional tests (échantillon par skill)
        run: |
          python evals/run_evals.py --functional --sample 3

  full-suite:
    name: Full suite (main only)
    runs-on: ubuntu-latest
    needs: [triggering-tests, functional-tests]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run full evaluation suite
        run: |
          python evals/run_evals.py --full

      - name: Aggregate benchmark
        run: |
          python evals/aggregate_benchmark.py > evals/last-benchmark.md

      - name: Upload benchmark report
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: evals/last-benchmark.md
